name: radiant

services:
  postgres:
    image: postgres:16-alpine
    container_name: radiant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radiant}
      POSTGRES_USER: ${POSTGRES_USER:-radiant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radiant} -d ${POSTGRES_DB:-radiant}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  directus:
    image: directus/directus:11.16.1
    container_name: radiant-directus
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: ${TZ:-America/Los_Angeles}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-radiant}
      DB_USER: ${POSTGRES_USER:-radiant}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      PUBLIC_URL: ${ADMIN_PUBLIC_URL:-http://localhost:1337}
      CORS_ENABLED: "true"
      CORS_ORIGIN: ${WP_ORIGIN},${ADMIN_PUBLIC_URL}
      WEBSOCKETS_ENABLED: "true"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    ports:
      - "0.0.0.0:1337:8055"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:8055/server/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  radiant-admin:
    build:
      context: ./services/radiant-admin
      dockerfile: Dockerfile
    container_name: radiant-admin
    restart: unless-stopped
    depends_on:
      radiant-api:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${RADIANT_ADMIN_API_BASE_URL:-http://localhost:3000}
      VITE_ADMIN_TOKEN: ${RADIANT_ADMIN_TOKEN}
    ports:
      - "0.0.0.0:5173:5173"

  radiant-api:
    build:
      context: ./services/radiant-api
      dockerfile: Dockerfile
    container_name: radiant-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: ${TZ:-America/Los_Angeles}
      PORT: 3000
      API_VERSION: v1
      DATABASE_URL: ${DATABASE_URL}
      DIRECTUS_URL: ${DIRECTUS_URL:-http://directus:8055}
      DIRECTUS_ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      DIRECTUS_ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      NOW_PLAYING_CONFIDENCE_MIN: ${NOW_PLAYING_CONFIDENCE_MIN:-0.80}
      NOW_PLAYING_FRESH_SECONDS: ${NOW_PLAYING_FRESH_SECONDS:-30}
      WP_ORIGIN: ${WP_ORIGIN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://www.kaad-lp.org,http://localhost:8080}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RADIANT_ADMIN_TOKEN: ${RADIANT_ADMIN_TOKEN:-}
      RADIANT_ADMIN_TITLE: ${RADIANT_ADMIN_TITLE:-KAAD-lp Admin}
      RADIANT_PUBLIC_STATUS_TITLE: ${RADIANT_PUBLIC_STATUS_TITLE:-Public Status}
      ACRCLOUD_CALLBACK_SECRET: ${ACRCLOUD_CALLBACK_SECRET}
      ACRCLOUD_CALLBACK_TOKEN: ${ACRCLOUD_CALLBACK_TOKEN:-}
      ACRCLOUD_DEDUPE_SECONDS: ${ACRCLOUD_DEDUPE_SECONDS:-120}
      ACRCLOUD_EXPECTED_PROJECT_ID: ${ACRCLOUD_EXPECTED_PROJECT_ID:-}
      ICECAST_META_CONFIG_PATH: ${ICECAST_META_CONFIG_PATH:-/app/data/icecast-meta-config.json}
      ICECAST_META_ENABLED: ${ICECAST_META_ENABLED:-false}
      ICECAST_META_SCHEME: ${ICECAST_META_SCHEME:-http}
      ICECAST_META_HOST: ${ICECAST_META_HOST:-}
      ICECAST_META_PORT: ${ICECAST_META_PORT:-8000}
      ICECAST_META_MOUNT: ${ICECAST_META_MOUNT:-stream}
      ICECAST_META_USERNAME: ${ICECAST_META_USERNAME:-source}
      ICECAST_META_PASSWORD: ${ICECAST_META_PASSWORD:-}
      ICECAST_LISTENER_HISTORY_PATH: ${ICECAST_LISTENER_HISTORY_PATH:-/app/data/icecast-listener-history.json}
      ICECAST_GEO_CACHE_PATH: ${ICECAST_GEO_CACHE_PATH:-/app/data/icecast-geo-cache.json}
      ICECAST_SNAPSHOT_CACHE_MS: ${ICECAST_SNAPSHOT_CACHE_MS:-20000}
      ICECAST_GEO_CACHE_SUCCESS_TTL_MS: ${ICECAST_GEO_CACHE_SUCCESS_TTL_MS:-2592000000}
      ICECAST_GEO_CACHE_FAILURE_TTL_MS: ${ICECAST_GEO_CACHE_FAILURE_TTL_MS:-300000}
    volumes:
      - radiant_api_data:/app/data
    ports:
      - "0.0.0.0:3000:3000"

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
  radiant_api_data:
